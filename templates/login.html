{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="main-content">
        <div class="form-wrapper">
            <section class="form-selection">
                <h1 class="form-title">Login</h1>

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="form-group">
                        <label>Username or Email:</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Password:</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <div class="d-flex justify-content-end mt-2">
                        <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
                    </div>

                    <div class="button-container">
                        <button type="submit" class="btn btn-primary create-btn">Login</button>
                    </div>
                </form>

                <p style="text-align:center; margin-top:16px; font-size:0.9rem;">
                    Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
                </p>
            </section>
        </div>
    </div>
</div>
{% endblock %}
