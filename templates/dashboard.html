{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="dashboard-page">
    <section class="welcome-bar">
        <div class ="welcome-content">
            <h2 class = "welcome-title"> Welcome Back</h2>
            <p class="welcome-text">
                Here's an overview of your job application activity
            </p>
        </div>
    </section>

    <!--<div class="button-container">
        <a href="{{ url_for('add_application') }}" class="btn btn-primary">Add New Application</a>
    </div>-->

    <main class="dashboard-container">

        <div class="dashboard-top">
            
                <!--Dashboard At A Glance section-->
                <section class="dashboard-glance">
                    <h2 class="h2 section-heading">At a Glance</h2>

                    <div class="card stat-card">
                        <div class="card-bar"></div>
                        <div class="card-body">
                            <span class="card-label">Applications Submitted</span>
                            <span class="card-value">{{ total }}</span>
                        </div>
                    </div>
                </section>

                <!--Dashboard chart Section-->
                <section class="dashboard-chart">

                </section>
                <!--<h1 class="h1">Dashboard</h1>

                    <div style="padding:15px; background:#3399ff; color:white; border-radius:10px; width:120px;">
                        Total<br><b>{{ total }}</b>
                    </div>
                    <div style="padding:15px; background:orange; color:white; border-radius:10px; width:120px;">
                        Interview<br><b>{{ interview }}</b>
                    </div>
                    <div style="padding:15px; background:green; color:white; border-radius:10px; width:120px;">
                        Offer<br><b>{{ offer }}</b>
                    </div>
                    <div style="padding:15px; background:red; color:white; border-radius:10px; width:120px;">
                        Rejected<br><b>{{ rejected }}</b>
                    </div>
                </div>-->
        </div>    
    </main>
</div>

{% endblock %}
