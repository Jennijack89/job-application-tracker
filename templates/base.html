<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>{% block title %}{% endblock %}</title>

        <!-- Bootstrap-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- My Custom CSS -->
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    </head>
    <body>

        <header>
            <nav class="navbar">
                <div class="nav-left">
                    <img src="{{url_for('static', filename = 'images/logo.png')}}" alt="Logo" class="logo">
                    <span class="app-name"> JobAppTrack </span>
                </div>

                <div class="nav-center">
                    <!-- Change to this once login page added % if session.get('user_id') % -->
                    {% if request.endpoint not in ['register', 'login'] %}
                        <a href="{{ url_for('dashboard') }}">Dashboard</a>
                        <a href="{{ url_for('add_application') }}">Add Application</a>
                        <a href="{{ url_for('view_app') }}"> View Applications</a>
                    {% endif %}
                </div>

                <div class="nav-right">
                    <div class="profile-circle"></div>
                </div>
            </nav>
        </header>

        {% with messages = get_flashed_messages() %}
            {%if messages %}
                <div class="container mt-3">
                    {%for msg in messages %}
                        <div class="alert alert-warning">{{msg}}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}

        <!-- Bootstrap JS Bundle (includes Popper) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
