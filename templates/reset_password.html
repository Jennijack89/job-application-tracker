{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="main-content">
        <div class="form-wrapper">
            <section class="form-selection">
                <h1 class="form-title">Reset Password</h1>
                <p class="helper-text">Enter the 6-digit code from your email and choose a new password.</p>

                <form method="POST" action="{{ url_for('reset_password') }}">
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" name="email" class="form-control" value="{{ email or '' }}" required>
                    </div>

                    <div class="form-group">
                        <label>6-Digit Code:</label>
                        <input type="text" name="code" class="form-control" maxlength="6" required>
                    </div>

                    <div class="form-group">
                        <label>New Password:</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Confirm New Password:</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>

                    <div class="button-container">
                        <button type="submit" class="btn btn-primary create-btn">Reset Password</button>
                    </div>
                </form>

                <p style="text-align:center; margin-top:16px; font-size:0.9rem;">
                    Need a new code? <a href="{{ url_for('forgot_password') }}">Send another code</a>
                </p>
            </section>
        </div>
    </div>
</div>
{% endblock %}
