<!DOCTYPE html>
<html>
<head>

<title>Job Application Tracker</title>

<style>

body{

font-family:Arial;
background:#f4f6f8;
margin:0;
padding:0;

}

.container{

max-width:900px;
margin:auto;
background:white;
padding:30px;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);

}

h1{

color:#2c3e50;

}

a{

text-decoration:none;
color:#3498db;
font-weight:bold;

}

a:hover{

text-decoration:underline;

}

.dashboard{

display:flex;
gap:20px;
margin-top:20px;
margin-bottom:20px;

}

.card{

flex:1;
padding:20px;
color:white;
border-radius:10px;
font-size:18px;
font-weight:bold;

}

.total{

background:#3498db;

}

.interview{

background:#f39c12;

}

.offer{

background:#27ae60;

}

.rejected{

background:#e74c3c;

}

.job{

background:#f9f9f9;
padding:15px;
margin-top:15px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
transition:0.2s;

}

.job:hover{

transform:scale(1.01);
box-shadow:0 4px 15px rgba(0,0,0,0.1);

}

.company{

font-weight:bold;
font-size:18px;

}

button{

background:#e74c3c;
color:white;
border:none;
padding:8px 16px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
transition:0.2s;

}

button:hover{

background:#c0392b;
transform:scale(1.05);

}

.edit{

margin-left:10px;
font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h1>Job Application Tracker</h1>

<a href="/add">Add New Application</a>

<hr>


<h2>Dashboard</h2>

<div class="dashboard">

<div class="card total">

Total<br>
{{ total }}

</div>


<div class="card interview">

Interview<br>
{{ interview }}

</div>


<div class="card offer">

Offer<br>
{{ offer }}

</div>


<div class="card rejected">

Rejected<br>
{{ rejected }}

</div>


</div>


<h2>Saved Applications</h2>


{% for job in jobs %}

<div class="job">

<div class="company">

{{ job[1] }}

</div>


<div>

{{ job[2] }} – {{ job[3] }}

</div>


<div>

Status:
<span style="color:#3498db;font-weight:bold;">
{{ job[4] }}
</span>

</div>


<div>

Date:
{{ job[5] }}

</div>


<form action="/delete/{{ job[0] }}" method="POST">

<button type="submit">

Delete

</button>


<a class="edit" href="/edit/{{ job[0] }}">

Edit

</a>


</form>


</div>

{% endfor %}



</div>

</body>

</html>
