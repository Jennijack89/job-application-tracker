{% extends "base.html" %}

{% block title %}Edit Application{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="mx-auto" style="max-width: 700px; background:#fff; padding: 30px; border-radius: 12px;">
    <h1 class="mb-4">Edit Application</h1>

    <a class="btn btn-secondary mb-3" href="{{ url_for('view_app') }}">Back to Applications</a>

    <form method="POST" action="{{ url_for('edit_application', app_id=application['id']) }}">
      <label class="form-label">Company</label>
      <input name="company" type="text" class="form-control" value="{{ application['company'] }}" required>

      <label class="form-label mt-3">Job Title</label>
      <input name="job_title" type="text" class="form-control" value="{{ application['job_title'] }}" required>

      <label class="form-label mt-3">Location</label>
      <input name="location" type="text" class="form-control" value="{{ application['location'] }}" required>

      <label class="form-label mt-3">Status</label>
      <select name="status" class="form-control">
        <option value="Applied" {% if application['status'] == 'Applied' %}selected{% endif %}>Applied</option>
        <option value="Interview" {% if application['status'] == 'Interview' %}selected{% endif %}>Interview</option>
        <option value="Offer" {% if application['status'] == 'Offer' %}selected{% endif %}>Offer</option>
        <option value="Rejected" {% if application['status'] == 'Rejected' %}selected{% endif %}>Rejected</option>
      </select>

      <label class="form-label mt-3">Date</label>
      <input name="apply_date" type="date" class="form-control" value="{{ application['apply_date'] }}" required>

      <div class="mt-4">
        <button class="btn btn-primary" type="submit">Update</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
